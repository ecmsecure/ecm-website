baseurl: ""
permalink: '/:title/'
collections:
  posts:
    permalink: '/posts/:title/'
base_font: nunito-sans
palette: blue
header:
  logo_img: images/logo.svg
  logo_img_alt: Logo
  has_nav: true
  nav_links:
    - label: Home
      url: /
      style: link
    - label: Technology
      url: /features
      style: link
    - label: Businesses
      url: /features
      style: link
    - label: Developers
      url: /pricing
      style: link
    - label: Contact
      url: /signup
      style: primary
footer:
  sections:
    - type: footer_text
      image: images/logo.svg
      image_url: /
      image_alt: Encryptometrics
      content: Encryptometrics
    - type: footer_nav
      title: Company
      nav_links:
        - label: About Us
          url: /about
          style: link
    - type: footer_nav
      title: Community
      nav_links:
        - label: LinkedIn
          url: 'https://www.linkedin.com/company/ecmsecure/'
          style: link
          has_icon: true
          icon: linkedin
          icon_position: left
    - type: footer_form
      title: Subscribe
      content: Stay up to date with our latest developments.
      form_id: contactForm
      hide_labels: true
      form_fields:
        - input_type: email
          name: email
          label: Email
          default_value: Enter email address
          is_required: true
      submit_label: Subscribe
  has_nav: true
  nav_links:
    - label: Terms of Service
      url: /terms-of-service
      style: link
    - label: Privacy Policy
      url: /privacy-policy
      style: link
  content: >-
    &copy; Copyright ECM 2023 - All rights reserved.
usass:
  indentWidth: 4
  style: nested
  precision: 10
plugins:
  - jekyll-menus
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - README.md
  - netlify.toml
  - stackbit-build.sh
